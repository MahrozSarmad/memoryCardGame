<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Match · Duel</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    /* CSS Variables */

    :root {
      --bg:        #05050f;
      --panel:     #0d0d22;
      --border:    #1a1a40;
      --p1:        #00f5ff;
      --p1-dim:    #004f55;
      --p2:        #ff2d78;
      --p2-dim:    #55000f;
      --gold:      #ffd700;
      --text:      #e0e0ff;
      --muted:     #5a5a88;
      --card-back: #111133;
      --card-front:#0a0a20;
      --radius:    14px;
      --glow1:     0 0 18px #00f5ff88;
      --glow2:     0 0 18px #ff2d7888;
    }


    /* Reset & Base  */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


    html, body {
      height: 100vh;
      overflow: hidden;
    }

    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 16px 10px;
      overflow: hidden;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* subtle scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Title  */
    .title-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 8px;
    }

    .title-wrap h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 3vw, 1.6rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--p1), var(--p2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 12px rgba(0,245,255,.4));
    }

    .title-wrap p {
      font-size: .7rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
    }

    /* Scoreboard  */
    .scoreboard {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 560px;
      margin-bottom: 8px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .player-panel {
      flex: 1;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: background .4s;
      position: relative;
    }

    .player-panel.p1 { background: rgba(0,245,255,.04); border-right: 1px solid var(--border); }
    .player-panel.p2 { background: rgba(255,45,120,.04); }

    .player-panel.active-turn.p1 { background: rgba(0,245,255,.12); box-shadow: inset 0 0 30px rgba(0,245,255,.08); }
    .player-panel.active-turn.p2 { background: rgba(255,45,120,.12); box-shadow: inset 0 0 30px rgba(255,45,120,.08); }

    .player-panel .label {
      font-family: 'Orbitron', sans-serif;
      font-size: .65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .p1 .label { color: var(--p1); }
    .p2 .label { color: var(--p2); }

    .player-panel .name {
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .player-panel .score {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }
    .p1 .score { color: var(--p1); text-shadow: var(--glow1); }
    .p2 .score { color: var(--p2); text-shadow: var(--glow2); }

    /* turn arrow indicator */
    .player-panel .turn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity .3s;
    }
    .p1 .turn-dot { background: var(--p1); box-shadow: var(--glow1); }
    .p2 .turn-dot { background: var(--p2); box-shadow: var(--glow2); }
    .player-panel.active-turn .turn-dot { opacity: 1; animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity:1; }
      50%      { transform: scale(1.6); opacity:.5; }
    }

    /* middle stats column */
    .stats-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 14px;
      gap: 4px;
      background: rgba(255,255,255,.02);
      min-width: 90px;
    }

    .stats-col .stat { text-align: center; }
    .stats-col .stat .s-label {
      font-size: .65rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
    }
    .stats-col .stat .s-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 1px;
    }

    /* Controls  */
    .controls {
      position: relative;
      z-index: 1;
      margin-bottom: 8px;
    }

    #restartBtn {
      font-family: 'Orbitron', sans-serif;
      font-size: .6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 7px 22px;
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      border-radius: 40px;
      cursor: pointer;
      transition: all .25s;
    }
    #restartBtn:hover {
      border-color: var(--p1);
      color: var(--p1);
      box-shadow: var(--glow1);
    }

    /* Turn Banner  */
    .turn-banner {
      position: relative;
      z-index: 1;
      font-family: 'Orbitron', sans-serif;
      font-size: .65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding: 5px 20px;
      border-radius: 40px;
      transition: all .4s;
    }
    .turn-banner.p1-turn {
      color: var(--p1);
      border: 1px solid var(--p1-dim);
      background: rgba(0,245,255,.06);
      box-shadow: var(--glow1);
    }
    .turn-banner.p2-turn {
      color: var(--p2);
      border: 1px solid var(--p2-dim);
      background: rgba(255,45,120,.06);
      box-shadow: var(--glow2);
    }

    /* Game Board */
    #board {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 460px;
    }

    /* Card  */
    .card {
      aspect-ratio: 1;
      perspective: 900px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
      border-radius: var(--radius);
    }

    .card.flipped   .card-inner { transform: rotateY(180deg); }
    .card.matched   .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* Back face */
    .card-back {
      background: var(--card-back);
      border: 1px solid var(--border);
      font-size: 1.6rem;
      color: var(--muted);
      transition: border-color .2s, box-shadow .2s;
    }
    .card:hover:not(.flipped):not(.matched) .card-back {
      border-color: var(--p1);
      box-shadow: var(--glow1);
    }
    .card-back::before {
      content: '?';
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      opacity: .4;
    }
   
    .card-back::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.04);
    }

    
    .card-front {
      background: var(--card-front);
      border: 1px solid var(--border);
      font-size: 1.8rem;
      transform: rotateY(180deg);
    }

    /* matched glow based on player */
    .card.matched-p1 .card-front {
      border-color: var(--p1);
      box-shadow: 0 0 20px rgba(0,245,255,.35), inset 0 0 20px rgba(0,245,255,.06);
      background: linear-gradient(135deg, #0a1a2a, #0a0a20);
    }
    .card.matched-p2 .card-front {
      border-color: var(--p2);
      box-shadow: 0 0 20px rgba(255,45,120,.35), inset 0 0 20px rgba(255,45,120,.06);
      background: linear-gradient(135deg, #1a0a12, #0a0a20);
    }

    
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    #modal-overlay.show { display: flex; }

    #modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      position: relative;
      animation: modalIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes modalIn {
      from { transform: scale(.6) translateY(40px); opacity: 0; }
      to   { transform: scale(1) translateY(0);     opacity: 1; }
    }

    #modal .trophy { font-size: 4rem; margin-bottom: 12px; display: block; }

    #modal h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    #modal h2.winner-p1 { color: var(--p1); text-shadow: var(--glow1); }
    #modal h2.winner-p2 { color: var(--p2); text-shadow: var(--glow2); }
    #modal h2.winner-tie { color: var(--gold); text-shadow: 0 0 16px #ffd70088; }

    #modal .sub {
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    .modal-stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
    }
    .modal-stats .ms {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .modal-stats .ms .ml {
      font-size: .65rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .modal-stats .ms .mv {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      color: var(--gold);
    }

    .modal-scores {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 28px;
    }
    .modal-scores .ps {
      padding: 12px 22px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .modal-scores .ps.p1s { background: rgba(0,245,255,.08); border: 1px solid var(--p1-dim); }
    .modal-scores .ps.p2s { background: rgba(255,45,120,.08); border: 1px solid var(--p2-dim); }
    .modal-scores .ps .pn { font-size: .8rem; letter-spacing: 2px; font-weight: 600; }
    .p1s .pn { color: var(--p1); }
    .p2s .pn { color: var(--p2); }
    .modal-scores .ps .psc {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 700;
    }
    .p1s .psc { color: var(--p1); }
    .p2s .psc { color: var(--p2); }

    #playAgainBtn {
      font-family: 'Orbitron', sans-serif;
      font-size: .75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 14px 36px;
      background: linear-gradient(135deg, var(--p1), #0070ff);
      border: none;
      border-radius: 40px;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(0,245,255,.3);
    }
    #playAgainBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,245,255,.5);
    }

    /* Name Setup Modal */
    #setup-overlay {
      display: flex;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.9);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    #setup-modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 48px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      animation: modalIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }

    #setup-modal h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--p1), var(--p2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #setup-modal p {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .input-group {
      margin-bottom: 16px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: .7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .input-group.g1 label { color: var(--p1); }
    .input-group.g2 label { color: var(--p2); }

    .input-group input {
      width: 100%;
      padding: 10px 16px;
      background: rgba(255,255,255,.04);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 1px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-group.g1 input { border: 1px solid var(--p1-dim); }
    .input-group.g1 input:focus { border-color: var(--p1); box-shadow: var(--glow1); }
    .input-group.g2 input { border: 1px solid var(--p2-dim); }
    .input-group.g2 input:focus { border-color: var(--p2); box-shadow: var(--glow2); }

    #startBtn {
      margin-top: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: .75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 14px 36px;
      background: linear-gradient(135deg, var(--p1), #0070ff);
      border: none;
      border-radius: 40px;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(0,245,255,.3);
      width: 100%;
    }
    #startBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,245,255,.5);
    }

    
    @media (max-width: 500px) {
      #board { gap: 6px; max-width: 320px; }
      .card-front { font-size: 1.4rem; }
      .scoreboard { flex-direction: column; }
      .player-panel.p1 { border-right: none; border-bottom: 1px solid var(--border); }
      .stats-col { flex-direction: row; gap: 20px; padding: 8px; }
    }

    
    @media (max-height: 700px) {
      html, body { height: auto; overflow: auto; }
      body { justify-content: flex-start; padding-top: 10px; padding-bottom: 10px; }
    }
  </style>
</head>
<body>

<!-- Setup Modal -->
<div id="setup-overlay">
  <div id="setup-modal">
    <h2>Memory Match Duel</h2>
    <p>Enter player names to begin</p>
    <div class="input-group g1">
      <label>Player 1</label>
      <input type="text" id="p1Name" placeholder="Cyan Warrior" maxlength="14"/>
    </div>
    <div class="input-group g2">
      <label>Player 2</label>
      <input type="text" id="p2Name" placeholder="Pink Shadow" maxlength="14"/>
    </div>
    <button id="startBtn">Start Game</button>
  </div>
</div>

<!-- Header  -->
<div class="title-wrap">
  <h1>Memory Match · Duel</h1>
  <p>Find all pairs — best score wins</p>
</div>

<!-- Scoreboard -->
<div class="scoreboard">
  <div class="player-panel p1 active-turn" id="p1Panel">
    <div class="turn-dot"></div>
    <span class="label">Player 1</span>
    <span class="name" id="p1NameDisplay">Player 1</span>
    <span class="score" id="p1Score">0</span>
  </div>

  <div class="stats-col">
    <div class="stat">
      <span class="s-label">Moves</span>
      <span class="s-val" id="moveCount">0</span>
    </div>
    <div class="stat">
      <span class="s-label">Time</span>
      <span class="s-val" id="timer">00:00</span>
    </div>
  </div>

  <div class="player-panel p2" id="p2Panel">
    <div class="turn-dot"></div>
    <span class="label">Player 2</span>
    <span class="name" id="p2NameDisplay">Player 2</span>
    <span class="score" id="p2Score">0</span>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button id="restartBtn">↺ &nbsp;Restart</button>
</div>

<!-- Turn Banner -->
<div class="turn-banner p1-turn" id="turnBanner">Player 1's Turn</div>

<!-- Game Board -->
<div id="board"></div>

<!-- Win Modal -->
<div id="modal-overlay">
  <div id="modal">
    <span class="trophy" id="modalTrophy">🏆</span>
    <h2 id="modalTitle">Victory!</h2>
    <p class="sub" id="modalSub">Congratulations</p>
    <div class="modal-scores">
      <div class="ps p1s">
        <span class="pn" id="mp1Name">P1</span>
        <span class="psc" id="mp1Score">0</span>
      </div>
      <div class="ps p2s">
        <span class="pn" id="mp2Name">P2</span>
        <span class="psc" id="mp2Score">0</span>
      </div>
    </div>
    <div class="modal-stats">
      <div class="ms">
        <span class="ml">Total Moves</span>
        <span class="mv" id="modalMoves">0</span>
      </div>
      <div class="ms">
        <span class="ml">Time</span>
        <span class="mv" id="modalTime">00:00</span>
      </div>
    </div>
    <button id="playAgainBtn">Play Again</button>
  </div>
</div>

<script>
$(document).ready(function () {

  /* Symbols */
  const SYMBOLS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];

  /* Game State */
  let state = {};

  /* Player Names */
  let p1Name = 'Player 1';
  let p2Name = 'Player 2';

  /* Setup  */
  $('#startBtn').click(function () {
    const n1 = $('#p1Name').val().trim();
    const n2 = $('#p2Name').val().trim();
    p1Name = n1 || 'Cyan Warrior';
    p2Name = n2 || 'Pink Shadow';
    $('#setup-overlay').fadeOut(300);
    initGame();
  });

  // allow Enter key to start
  $('#p1Name, #p2Name').on('keydown', function (e) {
    if (e.key === 'Enter') $('#startBtn').click();
  });

  /* Shuffle  */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* Init Game  */
  function initGame() {
    // Clear any existing timer
    clearInterval(state.timerInterval);

    state = {
      cards: shuffle([...SYMBOLS, ...SYMBOLS]),
      flipped: [],         // indices of face-up unmatched cards
      matched: [],         // indices of matched cards
      moves: 0,
      seconds: 0,
      timerStarted: false,
      timerInterval: null,
      currentPlayer: 1,   // 1 or 2
      p1Score: 0,
      p2Score: 0,
      locked: false        // block clicks during animation
    };

    // Update name displays
    $('#p1NameDisplay').text(p1Name);
    $('#p2NameDisplay').text(p2Name);

    updateStats();
    setActiveTurn(1);
    buildBoard();
  }

  /* Build Board */
  function buildBoard() {
    const $board = $('#board').empty();

    state.cards.forEach(function (sym, idx) {
      const $card = $(`
        <div class="card" data-index="${idx}" data-sym="${sym}">
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">${sym}</div>
          </div>
        </div>
      `);
      $board.append($card);
    });

    // Stagger card entrance
    $('.card').each(function (i) {
      $(this).css({ opacity: 0, transform: 'scale(.7)' });
      const $c = $(this);
      setTimeout(function () {
        $c.css({ transition: 'opacity .3s, transform .3s', opacity: 1, transform: 'scale(1)' });
      }, i * 40);
    });
  }

  /* Card Click  */
  $(document).on('click', '.card', function () {
    const $card = $(this);
    const idx = parseInt($card.data('index'));

    // Guard: locked, already matched, already flipped
    if (state.locked) return;
    if (state.matched.includes(idx)) return;
    if (state.flipped.includes(idx)) return;
    if (state.flipped.length >= 2) return;

    // Start timer on first flip
    if (!state.timerStarted) {
      state.timerStarted = true;
      state.timerInterval = setInterval(tickTimer, 1000);
    }

    // Flip card
    $card.addClass('flipped');
    state.flipped.push(idx);

    // Two cards flipped → check match
    if (state.flipped.length === 2) {
      state.locked = true;
      state.moves++;
      updateStats();
      checkMatch();
    }
  });

  /* Check Match */
  function checkMatch() {
    const [i1, i2] = state.flipped;
    const sym1 = state.cards[i1];
    const sym2 = state.cards[i2];

    if (sym1 === sym2) {
      // MATCH 
      state.matched.push(i1, i2);
      const matchClass = state.currentPlayer === 1 ? 'matched-p1' : 'matched-p2';

      $(`.card[data-index="${i1}"], .card[data-index="${i2}"]`)
        .addClass('matched ' + matchClass);

      // Award point to current player
      if (state.currentPlayer === 1) {
        state.p1Score++;
      } else {
        state.p2Score++;
      }
      updateStats();
      state.flipped = [];
      state.locked = false;

      // Current player gets another turn (no switch)

      // Check game over
      if (state.matched.length === state.cards.length) {
        setTimeout(showModal, 600);
      }
    } else {
      // NO MATCH ✗ — flip back after delay
      setTimeout(function () {
        $(`.card[data-index="${i1}"], .card[data-index="${i2}"]`)
          .removeClass('flipped');
        state.flipped = [];
        state.locked = false;

        // Switch turn
        const next = state.currentPlayer === 1 ? 2 : 1;
        state.currentPlayer = next;
        setActiveTurn(next);
      }, 900);
    }
  }

  /* Update Stats  */
  function updateStats() {
    $('#moveCount').text(state.moves);
    $('#p1Score').text(state.p1Score);
    $('#p2Score').text(state.p2Score);
  }

  /* Set Active Turn UI  */
  function setActiveTurn(player) {
    if (player === 1) {
      $('#p1Panel').addClass('active-turn');
      $('#p2Panel').removeClass('active-turn');
      $('#turnBanner')
        .removeClass('p2-turn').addClass('p1-turn')
        .text(p1Name + "'s Turn");
    } else {
      $('#p2Panel').addClass('active-turn');
      $('#p1Panel').removeClass('active-turn');
      $('#turnBanner')
        .removeClass('p1-turn').addClass('p2-turn')
        .text(p2Name + "'s Turn");
    }
  }

  /* Timer  */
  function tickTimer() {
    state.seconds++;
    $('#timer').text(formatTime(state.seconds));
  }

  function formatTime(s) {
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    return mm + ':' + ss;
  }

  /* Show Win Modal  */
  function showModal() {
    clearInterval(state.timerInterval);

    const s1 = state.p1Score;
    const s2 = state.p2Score;

    let title, sub, titleClass, trophy;

    if (s1 > s2) {
      title = p1Name + ' Wins!';
      sub = 'Cyan reigns supreme 👑';
      titleClass = 'winner-p1';
      trophy = '🏆';
    } else if (s2 > s1) {
      title = p2Name + ' Wins!';
      sub = 'Pink dominates the board 👑';
      titleClass = 'winner-p2';
      trophy = '🏆';
    } else {
      title = "It's a Tie!";
      sub = 'Perfectly matched minds ⚡';
      titleClass = 'winner-tie';
      trophy = '🤝';
    }

    $('#modalTrophy').text(trophy);
    $('#modalTitle').text(title).attr('class', titleClass);
    $('#modalSub').text(sub);
    $('#mp1Name').text(p1Name);
    $('#mp2Name').text(p2Name);
    $('#mp1Score').text(s1);
    $('#mp2Score').text(s2);
    $('#modalMoves').text(state.moves);
    $('#modalTime').text(formatTime(state.seconds));

    $('#modal-overlay').addClass('show');
  }

  /* Restart & Play Again  */
  $('#restartBtn').click(function () {
    $('#modal-overlay').removeClass('show');
    initGame();
  });

  $('#playAgainBtn').click(function () {
    $('#modal-overlay').removeClass('show');
    initGame();
  });

}); // end document.ready
</script>
</body>
</html>
